<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FDF2F8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CycleCrave" />
    <meta name="description" content="Modern, premium period-friendly meal & craving tracker web app for women's cycle wellness." />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="icon" type="image/png" href="/pwa-192.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <title>CycleCrave — Period-Friendly Meal & Craving Tracker</title>
  </head>
  <body class="bg-rose-50/50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 font-sans antialiased selection:bg-pink-200 dark:selection:bg-pink-900 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(
            (reg) => console.log('SW registered:', reg.scope),
            (err) => console.log('SW registration failed:', err)
          );
        });
      }
    </script>
  </body>
</html>
